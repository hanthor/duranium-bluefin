[Distribution]
Distribution=postmarketos
Release=latest
Architecture=arm64

[Output]
ImageId=duranium-bluefin
OutputDirectory=mkosi.output
Format=disk
SectorSize=512

[Build]
ToolsTree=default
History=yes

[Content]
Bootable=yes
Bootloader=systemd-boot
Hostname=duranium-bluefin
Locale=en_US.UTF-8
Timezone=UTC
RootPassword=hashed:!

# Base system
Packages=
dbus
udev
ca-certificates

# GNOME Desktop
gnome-shell
gnome-terminal
gnome-control-center
gnome-camera
eog

# Bluefin tools
distrobox
podman
podman-compose
git
curl
wget
jq
ripgrep
fd-find
fzf
eza
zoxide
neovim
helix
zsh
tmux
starship
python3
python3-pip
nodejs
npm
rustup
golang-go
htop
btop
gstreamer1.0-tools
pipewire
wireplumber
openssh-server
openssh-client
network-manager
chrony

# X13s/ARM64 kernel
Packages=
linux-image-arm64

KernelCommandLine=rw arm64.nopauth clk_ignore_unused pd_ignore_unused efi=noruntime rd.driver.blacklist=qcom_q6v5_pas
