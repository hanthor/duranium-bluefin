[Distribution]
Distribution=postmarketos

[Config]
PassEnvironment=PMOS_DEVICE PMOS_VARIANT CI RELEASE
Environment=PMOS_DEVICE=qcom-sc7180-lenovo-thinkpad-x13s
	PMOS_VARIANT=gnome
	RELEASE=edge
# Multi-image builds auto-discover mkosi.images/ subdirectories

[Build]
History=yes
CacheDirectory=mkosi.cache
Incremental=no

[Output]
OutputDirectory=mkosi.output/%i
SplitArtifacts=partitions,uki
