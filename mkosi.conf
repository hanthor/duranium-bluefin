[Distribution]
Distribution=postmarketos
Release=latest
Architecture=arm64

[Output]
ImageId=duranium-bluefin
OutputDirectory=mkosi.output
Format=disk
SectorSize=512

[Build]
ToolsTree=default
History=yes

[Content]
Bootable=yes
Bootloader=systemd-boot
Hostname=duranium-bluefin
Locale=en_US.UTF-8
Timezone=UTC
RootPassword=hashed:!

# Base postmarketOS + GNOME
Packages=
gnome-shell
gnome-terminal
gnome-control-center
gnome-camera
eog
linux-image-arm64

KernelCommandLine=rw arm64.nopauth clk_ignore_unused pd_ignore_unused efi=noruntime rd.driver.blacklist=qcom_q6v5_pas
