[Distribution]
Distribution=postmarketos
# Release defaults to 'edge' if not specified

[Output]
ImageId=duranium-bluefin
OutputDirectory=mkosi.output
Format=disk
SectorSize=512

[Build]
ToolsTree=default
History=yes

[Content]
Bootable=yes
Bootloader=systemd-boot
Hostname=duranium-bluefin
Locale=en_US.UTF-8
Timezone=UTC
RootPassword=hashed:!
KernelCommandLine=rw arm64.nopauth clk_ignore_unused pd_ignore_unused efi=noruntime rd.driver.blacklist=qcom_q6v5_pas

# Packages for GNOME desktop + Bluefin tools
Packages=gnome-shell gnome-terminal gnome-control-center gnome-camera eog linux-image-arm64 fd-find curl wget git zsh fish tmux neofetch

[Output]
Finalize=mkosi.finalize
ExtraSearchPaths=system_files/
