[Distribution]
Distribution=postmarketos
# NOTE: Passed to build-image.py (with --release=), or defaults to 'edge'
# Release=

[Config]
# Pass these PMOS_* variables so they are available in sub-images (e.g. initrd)
# Pass the CI var so scripts can detect if they are running in gitlab CI
PassEnvironment=PMOS_DEVICE PMOS_VARIANT CI
Dependencies=
	base
	dev-tools-confext
	dev-tools-sysext

[Build]
ToolsTree=default
History=yes
CacheDirectory=mkosi.cache
Incremental=no
ToolsTreePackages=
	erofs-utils
	ukify
Environment=SYSTEMD_REPART_MKFS_OPTIONS_EROFS="-b 4096"

[Output]
OutputDirectory=mkosi.output/%i
SplitArtifacts=partitions,uki
# FIXME: mkosi insists on building and using it's own systemd-based initrd
# unless we specify a custom one, but we want to use the one we build in
# the buildroot... So we set an empty one here and "append" ours later.
Format=disk
ManifestFormat=json
# ImageId is generated by build-image.py and passed on cli
# ImageVersion is generated by mkosi.bump
Output=%i_%v
SectorSize=512    # For FAT/ESP, to fix u-boot sector mismatch errors

[Content]
BaseTrees=%O/base_%v
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImages=unsigned
# Match format for other artifacts that sysupdate manages
UnifiedKernelImageFormat=%i_%v
# Defaults for systemd-firstboot
# (should be changed at runtime by some initial setup UI)
Hostname=duranium
Locale=en_US.UTF-8
Timezone=UTC
RootPassword=hashed:!
KernelModulesInitrd=yes
KernelCommandLine=
	rw
# NOTE: mkosi.finalize installs devicetrees to a dir that mkosi searches, this
# option just tells mkosi to include everything in this special dir
Devicetrees=*
InitrdPackages=
	postmarketos-duranium-initramfs
# Remove any el2-related devicetrees, since these confuse dtbauto and it can end
# up selecting the wrong one, which is bad (system won't boot)
RemoveFiles=/boot/dtbs/**/*-el2.dtb

[Runtime]
RuntimeTrees=./mkosi.output:/mkosi.output
RuntimeSize=20G
Firmware=uefi
Console=native
QemuArgs=-display gtk,gl=on,show-cursor=on -device virtio-keyboard-pci -device virtio-tablet-pci -device virtio-gpu-gl -boot menu=on,splash-time=0
