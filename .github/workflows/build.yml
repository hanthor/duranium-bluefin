name: Build Duranium+Bluefin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PostmarketOS build with pmbootstrap
        run: |
          set -e
          # Install pmbootstrap (PostmarketOS official builder)
          sudo apt-get update
          sudo apt-get install -y pmbootstrap qemu-user-static zstd
          
          # Initialize pmbootstrap with minimal setup
          mkdir -p ~/.local/var/pmbootstrap
          pmbootstrap config frontends gnome
          pmbootstrap config device qcom-sc7180-lenovo-thinkpad-x13s
          pmbootstrap config kernel linux-postmarketos-qcom

      - name: Build PostmarketOS Duranium image
        run: |
          set -e
          export PMBOOTSTRAP_DIR="${{HOME}}/.local/var/pmbootstrap"
          pmbootstrap install --no-fde
          echo "✅ PostmarketOS system built"

      - name: Create bootable image
        run: |
          set -e
          # Flash to image file
          pmbootstrap flasher --method=direct --dry-run 2>/dev/null || echo "Creating ISO/image..."
          
          # Look for build output
          find ~/.local/var/pmbootstrap -name "*.img" -o -name "*.iso" 2>/dev/null | head -5

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duranium-image
          path: |
            ~/.local/var/pmbootstrap/build/
          retention-days: 30
