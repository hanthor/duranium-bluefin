name: Build PostmarketOS Duranium+Bluefin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - device: qcom-sc7180-lenovo-thinkpad-x13s
            ui: gnome
            release: edge

    container:
      image: alpine:edge
      options: --privileged

    env:
      PMOS_DEVICE: ${{ matrix.device }}
      PMOS_VARIANT: ${{ matrix.ui }}
      RELEASE: ${{ matrix.release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PostmarketOS build environment
        run: |
          set -e
          # Update Alpine
          apk upgrade -a
          apk add bash curl distribution-gpg-keys git mkosi python3 merge-usr
          
          # Convert to PostmarketOS environment (like official duranium does)
          ln -sf /usr/share/distribution-gpg-keys/postmarketos/build.postmarketos.org.rsa.pub /etc/apk/keys
          echo "http://mirror.postmarketos.org/postmarketos/extra-repos/systemd/main" >> /etc/apk/repositories
          echo "http://mirror.postmarketos.org/postmarketos/main" >> /etc/apk/repositories
          apk update
          apk add postmarketos-base-systemd postmarketos-base
          
          # Merge /usr for mkosi compatibility
          merge-usr >/dev/null 2>&1 || true
          
          echo "✅ PostmarketOS build environment ready"

      - name: Clone pmaports
        run: |
          git clone --depth 1 --branch master \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            /tmp/pmaports
          echo "✅ pmaports ready"

      - name: Build PostmarketOS Duranium
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          
          # Use python script like official duranium does, or build directly
          export IMAGEVERSION=$(date +%Y%m%d)
          mkosi --force build
          echo "✅ Build complete"
          ls -lh mkosi.output/ || true

      - name: Compress images
        if: success()
        run: |
          set -e
          [ -d mkosi.output ] || exit 0
          cd mkosi.output
          for img in *.raw; do
            [ -f "$img" ] && zstd -19 "$img" -o "${img}.zst" || true
          done
          ls -lh *.zst 2>/dev/null || echo "No compressed images"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duranium-bluefin-${{ matrix.device }}-${{ matrix.ui }}
          path: mkosi.output/
          retention-days: 30
