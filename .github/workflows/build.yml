name: Build PostmarketOS Duranium+Bluefin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - device: qcom-sc7180-lenovo-thinkpad-x13s
            ui: gnome
            release: edge

    env:
      PMOS_DEVICE: ${{ matrix.device }}
      PMOS_VARIANT: ${{ matrix.ui }}
      RELEASE: ${{ matrix.release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            git curl ca-certificates zstd \
            python3 python3-venv python3-dev \
            qemu-user-static qemu-utils dosfstools mtools
          
          # Install mkosi from git
          git clone --depth 1 https://github.com/systemd/mkosi.git /tmp/mkosi
          cd /tmp/mkosi
          pip3 install --break-system-packages .
          mkosi --version

      - name: Clone pmaports
        run: |
          git clone --depth 1 --branch master \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            /tmp/pmaports
          ls /tmp/pmaports

      - name: Build PostmarketOS Duranium
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          export IMAGEVERSION=$(date +%Y%m%d)
          sudo -E mkosi --force build
          echo "✅ Build complete"
          ls -lh mkosi.output/ || true

      - name: Compress images
        if: success()
        run: |
          set -e
          [ -d mkosi.output ] || exit 0
          cd mkosi.output
          for img in *.raw; do
            [ -f "$img" ] && zstd -19 "$img" -o "${img}.zst" || true
          done
          ls -lh *.zst 2>/dev/null || echo "No compressed images"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duranium-bluefin-${{ matrix.device }}-${{ matrix.ui }}
          path: mkosi.output/
          retention-days: 30
