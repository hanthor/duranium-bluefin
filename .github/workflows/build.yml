name: Build Duranium+Bluefin Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: systemd/mkosi:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Bluefin common OCI system files
        run: |
          mkdir -p system_files/bluefin
          
          # Pull Bluefin common OCI and extract to system_files
          docker create --name bluefin-extract ghcr.io/projectbluefin/common:latest true 2>/dev/null || podman create --name bluefin-extract ghcr.io/projectbluefin/common:latest true
          (docker export bluefin-extract 2>/dev/null || podman export bluefin-extract) | tar -C system_files/bluefin --strip-components=0 -xf - system_files/ || true
          (docker rm bluefin-extract 2>/dev/null || podman rm bluefin-extract) || true
          
          # List extracted files
          find system_files/bluefin -type f 2>/dev/null | head -20 || echo "No system files extracted (optional)"

      - name: Build image with mkosi
        run: |
          mkosi --force build

      - name: Compress image
        run: |
          cd mkosi.output
          zstd -19 *.raw -o duranium-bluefin.raw.zst
          ls -lh *.zst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duranium-bluefin-image
          path: mkosi.output/*.raw.zst
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: mkosi.output/*.raw.zst
          tag_name: auto-build-$(date +%s)
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
