name: Build Duranium+Bluefin

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pmos_device:
        description: 'PostmarketOS device'
        required: false
        default: 'qcom-sc7180-lenovo-thinkpad-x13s'
      pmos_variant:
        description: 'PostmarketOS UI variant'
        required: false
        default: 'gnome'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:edge
      options: --privileged
    env:
      PMOS_DEVICE: ${{ github.event.inputs.pmos_device || 'qcom-sc7180-lenovo-thinkpad-x13s' }}
      PMOS_VARIANT: ${{ github.event.inputs.pmos_variant || 'gnome' }}
      RELEASE: edge
      CI: 'true'
    steps:
      - name: Install build dependencies
        run: |
          apk update
          apk add git ca-certificates python3 curl bash
          
          # Install mkosi from edge repo
          apk add mkosi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PostmarketOS Duranium
        run: |
          cd $GITHUB_WORKSPACE
          mkosi --force build \
            -C mkosi.conf

      - name: Compress images
        if: always()
        run: |
          if [ -d mkosi.output ]; then
            cd mkosi.output
            if ls *.raw 1>/dev/null 2>&1; then
              apk add zstd
              for img in *.raw; do
                zstd -19 "$img" -o "${img}.zst"
              done
              ls -lh *.zst
            else
              echo "No raw images produced"
              find . -type f
            fi
          else
            echo "mkosi.output directory not found"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duranium-bluefin-images
          path: mkosi.output/
          retention-days: 30
