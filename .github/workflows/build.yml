name: Build Duranium+Bluefin Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Bluefin common OCI system files
        run: |
          mkdir -p system_files/bluefin
          
          # Pull Bluefin common OCI and extract to system_files
          docker create --name bluefin-extract ghcr.io/projectbluefin/common:latest true
          docker export bluefin-extract | tar -C system_files/bluefin --strip-components=0 -xf - system_files/ || true
          docker rm bluefin-extract
          
          # List extracted files
          find system_files/bluefin -type f | head -20

      - name: Install mkosi with PostmarketOS support
        run: |
          sudo apt-get update
          sudo apt-get remove -y mkosi || true
          sudo pip3 install --upgrade mkosi systemd

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build image
        run: |
          sudo mkosi --force build

      - name: Compress image
        run: |
          cd mkosi.output
          zstd -19 *.raw -o duranium-bluefin.raw.zst
          ls -lh *.zst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duranium-bluefin-image
          path: mkosi.output/*.raw.zst
          retention-days: 30
