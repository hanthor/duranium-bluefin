name: Build Duranium+Bluefin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: adamthiede/postmarketos:latest
      options: --privileged
    env:
      PMOS_DEVICE: qcom-sc7180-lenovo-thinkpad-x13s
      PMOS_VARIANT: gnome
      RELEASE: edge
      CI: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mkosi in container
        run: |
          set -e
          apk update
          apk add --no-cache git curl ca-certificates python3 py3-pip zstd
          pip install --break-system-packages mkosi
          mkosi --version

      - name: Download pmaports for device resolution
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 --branch master https://gitlab.postmarketos.org/postmarketOS/pmaports.git 2>/dev/null || echo "pmaports already available"

      - name: Build Duranium+Bluefin image
        run: |
          cd $GITHUB_WORKSPACE
          mkosi --force build

      - name: Compress and verify output
        if: always()
        run: |
          set -e
          if [ -d mkosi.output ]; then
            cd mkosi.output
            ls -lh
            if ls *.raw 1>/dev/null 2>&1; then
              echo "Raw images found, compressing..."
              for img in *.raw; do
                zstd -19 "$img" -o "${img}.zst"
              done
              ls -lh *.zst
            else
              echo "No raw images in output"
            fi
          else
            echo "No mkosi.output directory"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duranium-bluefin
          path: |
            mkosi.output/*.raw.zst
            mkosi.output/*.raw
          retention-days: 30
