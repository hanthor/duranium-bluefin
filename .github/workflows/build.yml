name: Build Duranium+Bluefin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PMOS_DEVICE: qcom-sc7180-lenovo-thinkpad-x13s
      PMOS_VARIANT: gnome
      RELEASE: edge
      CI: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mkosi and PostmarketOS build tools
        run: |
          set -e
          # Update system
          sudo apt-get update
          
          # Install mkosi from edge repo (has postmarketos support)
          sudo apt-get install -y git curl ca-certificates python3 python3-dev
          
          # Clone and install mkosi from latest
          cd /tmp
          git clone --depth 1 https://github.com/systemd/mkosi.git
          cd mkosi
          sudo pip install --break-system-packages -e .
          
          echo "mkosi version:"
          mkosi --version

      - name: Build Duranium+Bluefin image
        run: |
          cd $GITHUB_WORKSPACE
          sudo mkosi --force build -C mkosi.conf

      - name: Compress and verify output
        if: always()
        run: |
          set -e
          if [ -d mkosi.output ]; then
            cd mkosi.output
            ls -lh
            if ls *.raw 1>/dev/null 2>&1; then
              echo "Raw images found, compressing..."
              for img in *.raw; do
                sudo zstd -19 "$img" -o "${img}.zst"
              done
              ls -lh *.zst
            else
              echo "No raw images in output"
            fi
          else
            echo "No mkosi.output directory"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duranium-bluefin
          path: |
            mkosi.output/*.raw.zst
            mkosi.output/*.raw
          retention-days: 30
